services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cockpit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cockpit}
      POSTGRES_DB: ${POSTGRES_DB:-cockpit}
    ports:
      - "5432:5432"
    volumes:
      - cockpit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cockpit}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cockpit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cockpit}
      POSTGRES_DB: ${POSTGRES_DB:-cockpit}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      MINIMAX_BASE_URL: ${MINIMAX_BASE_URL:-https://api.minimax.io/v1}
      MINIMAX_MODEL: ${MINIMAX_MODEL:-MiniMax-M2.7}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app

volumes:
  cockpit_pgdata:
